<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>BURGERS.EXE // ORDER FLOW</title>
    <meta name="description" content="Burgers.exe terminal order flow por fases." />
    <meta property="og:title" content="BURGERS.EXE // ORDER FLOW" />
    <meta property="og:description" content="Compila tu orden en modo terminal." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/og-image-burgers-exe.png" />
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="panel hero">
        <p class="boot">BOOT.SEQ :: FLAVOR DAEMON ONLINE</p>
        <img class="hero-logo" src="./assets/logo-burgers-exe-neon.svg" alt="Logo BURGERS.EXE" />
        <p class="tag">MENU &gt; BURGERS &gt; CUSTOM &gt; EXTRAS &gt; GUARNICIONES &gt; DATOS &gt; RESUMEN</p>
      </header>

      <section class="panel">
        <div id="stepper" class="stepper"></div>
      </section>

      <section class="panel" id="stepContent"></section>

      <section class="panel nav-panel">
        <button id="loadLastBtn" type="button" class="ghost"><img src="./assets/icon-load-save.svg" alt="" aria-hidden="true" />Cargar pedido anterior</button>
        <button id="clearBtn" type="button" class="danger"><img src="./assets/icon-clear-save.svg" alt="" aria-hidden="true" />Reiniciar pedido</button>
        <button id="backBtn" type="button">Atrás</button>
        <button id="nextBtn" type="button" class="primary">Siguiente</button>
      </section>

      <section id="successPanel" class="panel success hidden"></section>
      <pre id="status" class="panel status">READY</pre>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
