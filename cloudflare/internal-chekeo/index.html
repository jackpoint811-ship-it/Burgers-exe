<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Chekeo Interno | Burgers.exe</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <section id="pin-screen" class="is-hidden" aria-labelledby="pin-title">
      <div class="auth-card"><h1 id="pin-title">Chekeo Interno</h1><p>Ingresa el PIN para continuar.</p><form id="pin-form"><label for="pin-input">PIN</label><input id="pin-input" name="pin" type="password" inputmode="numeric" autocomplete="off" required /><button id="pin-submit" type="submit">Entrar</button></form><p id="auth-status" class="auth-status" role="status" aria-live="polite"></p></div>
    </section>
    <div id="internal-app" class="is-hidden">
      <div class="app-shell">
        <header class="app-header"><p class="eyebrow">Burgers.exe</p><h1>Chekeo Interno</h1><p class="subtitle">Fase 7 · Hardening y QA final</p><div class="header-actions"><span class="badge">PIN/session activo</span><button id="logout-button" class="logout-button" type="button">Salir</button></div></header>
        <p class="scope-banner">Panel interno listo para QA/deploy controlado. Mantén variables y rollback verificados antes de usarlo en operación real.</p>
        <nav class="tab-nav" aria-label="Navegación principal"><button class="tab-button is-active" data-tab-target="inicio" type="button">Inicio</button><button class="tab-button" data-tab-target="pedidos" type="button">Pedidos</button><button class="tab-button" data-tab-target="cocina" type="button">Cocina</button><button class="tab-button" data-tab-target="otros" type="button">Otros</button></nav>
        <main>
          <section class="tab-panel" data-tab-panel="inicio"><div id="inicio-content"></div></section>
          <section class="tab-panel is-hidden" data-tab-panel="pedidos"><div id="pedidos-content"></div></section>
          <section class="tab-panel is-hidden" data-tab-panel="cocina"><div id="cocina-content"></div></section>
          <section class="tab-panel is-hidden" data-tab-panel="otros"><div id="otros-content"></div></section>
        </main>
        <div id="modal" class="modal is-hidden"><div class="modal-card"><button id="modal-close" class="ghost" type="button">Cerrar</button><div id="modal-content"></div></div></div>
        
        <div id="confirm-modal" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title"><div class="modal-card"><h3 id="confirm-title">Confirmar acción</h3><p id="confirm-message"></p><div class="row"><button id="confirm-cancel" class="ghost" type="button">Cancelar</button><button id="confirm-accept" class="write-btn" type="button">Confirmar</button></div></div></div>
        <p class="status-toast is-hidden" role="status" aria-live="polite"></p>
        <nav class="bottom-nav" aria-label="Navegación inferior"><button class="tab-button is-active" data-tab-target="inicio" type="button">Inicio</button><button class="tab-button" data-tab-target="pedidos" type="button">Pedidos</button><button class="tab-button" data-tab-target="cocina" type="button">Cocina</button><button class="tab-button" data-tab-target="otros" type="button">Otros</button></nav>
      </div>
    </div>
  </body>
</html>
