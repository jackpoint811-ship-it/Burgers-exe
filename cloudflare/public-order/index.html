<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>BURGERS.EXE // ORDER FLOW</title>
    <meta name="description" content="Burgers.exe terminal order flow para compilar tu pedido." />
    <meta property="og:title" content="BURGERS.EXE // ORDER FLOW" />
    <meta property="og:description" content="Compila tu orden en modo terminal." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/og-image-burgers-exe.png" />
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="panel hero">
        <p class="boot">BOOT.SEQ :: FLAVOR DAEMON ONLINE</p>
        <img class="hero-logo" src="./assets/logo-burgers-exe-neon.svg" alt="Logo BURGERS.EXE" />
        <p class="tag">COMPILA TU ORDEN // TERMINAL MODE</p>
        <img class="hero-art" src="./assets/mascot-burger-terminal.png" alt="Mascota estilo terminal de Burgers.exe" />
      </header>

      <section class="panel" id="customerPanel">
        <h2>1) DATOS CLIENTE</h2>
        <div class="grid two">
          <label>Nombre
            <input id="name" type="text" maxlength="80" placeholder="Tu nombre" />
          </label>
          <label>Teléfono
            <input id="phone" type="tel" maxlength="20" placeholder="10 dígitos" />
          </label>
        </div>
        <div class="grid two">
          <label>Ubicación
            <select id="location">
              <option value="">Selecciona</option>
              <option value="Torre GGA">Torre GGA</option>
              <option value="Torre Valcob">Torre Valcob</option>
            </select>
          </label>
          <fieldset>
            <legend>Forma de pago</legend>
            <label><input type="radio" name="payment" value="Pago mismo dia" checked /> Pago mismo dia</label>
            <label><input type="radio" name="payment" value="Pagar Antes" /> Pagar Antes</label>
          </fieldset>
        </div>
        <label>Nota para cocina / entrega
          <textarea id="note" rows="2" placeholder="Ej. Sin prisa, estoy en lobby."></textarea>
        </label>
      </section>

      <section class="panel" id="productsPanel">
        <h2>2) ARMA TU PEDIDO</h2>
        <div id="menuGrid" class="menu-grid"></div>
      </section>

      <section class="panel" id="customPanel">
        <h2>3) PERSONALIZACIONES POR BURGER</h2>
        <div id="burgerCustomizations" class="stack"></div>
      </section>

      <section class="panel" id="summaryPanel">
        <h2>4) RESUMEN</h2>
        <div id="summary" class="summary"></div>
        <div id="paymentInfo" class="payment-info"></div>
      </section>

      <section class="panel actions">
        <button id="loadLastBtn" type="button" class="ghost"><img src="./assets/icon-load-save.svg" alt="" aria-hidden="true" />LOAD LAST ORDER</button>
        <button id="clearBtn" type="button" class="danger"><img src="./assets/icon-clear-save.svg" alt="" aria-hidden="true" />NEW ORDER / CLEAR SAVE</button>
        <button id="submitBtn" type="button" class="primary"><img src="./assets/icon-success.svg" alt="" aria-hidden="true" />VALIDAR PEDIDO</button>
      </section>

      <section id="successPanel" class="panel success hidden"></section>
      <pre id="status" class="panel status">READY</pre>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
