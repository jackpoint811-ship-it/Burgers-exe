<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chekeo Interno</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <section id="pin-screen" class="card hidden">
      <h1>Chekeo Interno</h1>
      <p>Ingresa el PIN para continuar.</p>
      <form id="pin-form">
        <input id="pin-input" type="password" inputmode="numeric" autocomplete="off" required />
        <button id="pin-button" type="submit">Entrar</button>
      </form>
    </section>

    <section id="panel-screen" class="card hidden">
      <header class="panel-header">
        <h2>Panel Chekeo</h2>
        <button id="logout-button" class="link-button" type="button">Salir</button>
      </header>
      <p>Sesión activa.</p>
    </section>

    <p id="status" class="status" aria-live="polite"></p>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
