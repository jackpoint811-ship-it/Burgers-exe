<style>
  :root {
    --bg: #f3f4f6;
    --card: #fff;
    --text: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --primary: #111827;
    --danger: #c62828;
    --ok: #2e7d32;
    --overlay: rgba(17, 24, 39, 0.42);
    --mobile-shell-width: 460px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  h1, h2, h3, p { margin: 0; }
  h1, h2 { font-size: 18px; font-weight: 700; line-height: 1.2; }
  h2, h3 { margin-bottom: 6px; }

  .app-shell {
    width: min(100%, var(--mobile-shell-width));
    max-width: var(--mobile-shell-width);
    min-height: 100vh;
    height: auto;
    max-height: 1920px;
    margin: 0 auto;
    overflow-y: visible;
    padding: 6px 6px calc(64px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }

  .content { display: grid; gap: 8px; }

  .card,
  .orders-item,
  .kitchen-item,
  .summary-card,
  .history-item,
  .compact-item,
  .quick-item,
  .kitchen-next-preview,
  .kitchen-next-preview-empty {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
  }

  .app-header {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 8px;
  }
  .tab-panel.card { padding: 6px; border-radius: 8px; }
  .tab-panel > .card { padding: 8px; }
  .eyebrow { margin: 0 0 4px; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .muted { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .app-header .muted { display: none; }
  .is-hidden { display: none !important; }

  .toast { min-height: 20px; font-size: 13px; color: var(--muted); }
  .toast.success { color: var(--ok); }
  .toast.error { color: var(--danger); }

  .btn {
    min-height: 40px;
    border: 0;
    border-radius: 10px;
    padding: 8px 10px;
    font-weight: 700;
    cursor: pointer;
    background: var(--primary);
    color: #fff;
  }

  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: #fff; color: var(--text); border: 1px solid #d1d5db; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .btn.is-loading { opacity: 0.7; cursor: wait; }

  .chips { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 4px; }
  .chip {
    flex: 0 0 auto;
    min-height: 28px;
    padding: 0 8px;
    border-radius: 999px;
    border: 1px solid #d1d5db;
    background: #fff;
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
  }
  .chip.is-active { border-color: var(--primary); background: var(--primary); color: #fff; }

  .quick-summary,
  .orders-list,
  .kitchen-list,
  .history-list,
  .compact-list { display: grid; gap: 8px; }

  .quick-summary { grid-template-columns: 1fr 1fr; margin-top: 6px; }
  .quick-item .label,
  .summary-card .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .quick-item .value,
  .summary-card .value { font-size: 18px; font-weight: 700; }
  .quick-summary-divider {
    grid-column: 1 / -1;
    border-top: 1px dashed #d1d5db;
    margin: 2px 0 0;
    padding-top: 2px;
  }
  .quick-pending-block {
    grid-column: 1 / -1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    background: #fff;
  }
  .quick-pending-block h3 {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 6px;
  }
  .quick-pending-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 4px;
  }
  .quick-pending-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 13px;
  }

  .orders-list,
  .kitchen-list,
  .history-list,
  .compact-list { list-style: none; margin: 0; padding: 0; }
  .orders-item p,
  .kitchen-item p,
  .modal-content p { margin: 2px 0; }

  .orders-item-header { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
  .orders-item-name { font-weight: 700; }
  .orders-item-summary,
  .orders-item-meta { color: var(--muted); font-size: 13px; }
  .orders-item-meta { display: grid; gap: 1px; margin-top: 4px; }

  .pill,
  .check-pill {
    display: inline-block;
    border: 1px solid #d1d5db;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 6px;
    background: #fff;
    color: var(--muted);
  }

  .badge-alert { display: inline-block; margin-left: 6px; color: #92400e; font-weight: 700; }
  .empty-state { border-top: 1px dashed #9ca3af; margin: 6px 0; padding: 6px 0; color: var(--muted); font-size: 13px; }
  .order-actions-inline,
  .kitchen-actions,
  .modal-actions,
  .action-row,
  .kitchen-controls,
  .field { display: grid; gap: 6px; }

  .action-row,
  .modal-actions { grid-template-columns: repeat(2, 1fr); }
  .kitchen-actions { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }

  .kitchen-chips {
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .kitchen-chips .chip { border-color: #d1d5db; background: #fff; color: var(--text); }
  .kitchen-chips .chip.is-active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .ticket,
  .receipt-text {
    font-family: "Courier New", monospace;
    white-space: pre-wrap;
    line-height: 1.35;
    font-size: 14px;
  }

  .kitchen-ticket {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #fff;
    padding: 12px;
    font-family: inherit;
    white-space: normal;
    line-height: 1.4;
  }

  .kitchen-ticket-header { display: grid; gap: 4px; margin-bottom: 8px; }
  .kitchen-customer { margin: 0; font-size: 32px; font-weight: 800; line-height: 1.2; }
  .kitchen-subhead { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 18px; }
  .kitchen-section { border-top: 1px solid #eef0f3; padding-top: 8px; margin-top: 8px; }
  .kitchen-section h4 { margin: 0 0 4px; font-size: 18px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); }
  .kitchen-section-list { margin: 0; padding-left: 18px; display: grid; gap: 2px; }
  .kitchen-section-list li { font-size: 26px; }
  .kitchen-note { border-top: 1px dashed #d1d5db; margin-top: 8px; padding-top: 8px; color: var(--muted); font-size: 20px; }
  .kitchen-note p { margin: 4px 0 0; white-space: pre-wrap; }
  .kitchen-next-name { margin: 4px 0 2px; font-weight: 700; color: var(--text); }

  .ticket-block,
  .summary-divider {
    border-top: 1px dashed #9ca3af;
    margin: 8px 0;
    padding-top: 8px;
  }

  .chip-side-ready {
    background: #e8f5ec;
    color: #1e6b36;
    border: 1px solid #b8dcc3;
    border-radius: 999px;
    font-size: 11px;
    padding: 2px 8px;
    margin-left: 8px;
  }

  .field { margin-top: 4px; }
  .field label { font-size: 12px; color: var(--muted); font-weight: 700; }

  input,
  select,
  textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
  }

  textarea { min-height: 56px; resize: vertical; }

  .summary-grid,
  .summary-lists { display: grid; gap: 8px; }
  .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-bottom: 8px; }
  .summary-lists { grid-template-columns: 1fr 1fr; }
  .summary-lists ul,
  .settings-list { margin: 0; padding-left: 18px; }
  .settings-list { display: grid; gap: 6px; }

  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0 auto;
    width: min(100%, var(--mobile-shell-width));
    max-width: var(--mobile-shell-width);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    padding: 4px 6px calc(4px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: #fff;
  }

  .tab-btn {
    min-height: 44px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    background: #fff;
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    padding: 0 4px;
  }

  .tab-btn.is-active { border-color: var(--primary); background: var(--primary); color: #fff; }

  .modal { position: fixed; inset: 0; z-index: 30; }
  .modal-backdrop { position: absolute; inset: 0; background: var(--overlay); }

  .modal-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    right: auto;
    transform: translate(-50%, -50%);
    width: min(calc(100% - 16px), var(--mobile-shell-width));
    max-width: var(--mobile-shell-width);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    max-height: 88vh;
    overflow: auto;
    padding: 10px;
  }

  .modal-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
  .modal-panel-small { max-width: 360px; border-radius: 14px; }

  .warning-card { border: 1px solid #f5d19a; background: #fff8ef; }
  .check-pill.is-ok { color: #1e6b36; border-color: #b8dcc3; background: #e8f5ec; }
  .check-pill.is-warning { color: #8d5a00; border-color: #f3d29a; background: #fff7ea; }
  .check-pill.is-error { color: #b3261e; border-color: #f2b8b5; background: #fdecec; }
  .action-row-single-mobile { margin-bottom: 8px; }
</style>
